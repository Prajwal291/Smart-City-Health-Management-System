{% extends "base.html" %}

{% block title %}Login - SHMS{% endblock %}

{% block header %}Welcome to SHMS{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="glass card animate-fade-in" style="width: 100%; max-width: 450px; padding: 2.5rem; background: rgba(255, 255, 255, 0.9); border: 1px solid white;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="display: inline-block; width: 70px; height: 70px; background: white; border-radius: 50%; padding: 8px; margin-bottom: 1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 2px solid var(--primary);">
                <div style="width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, #ef4444, #dc2626); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">
                    <i class="fas fa-heart-pulse"></i>
                </div>
            </div>
            <h2 class="text-gradient" style="font-size: 1.75rem; margin-top: 0.5rem;">Access Portal</h2>
            <p style="color: #475569; font-weight: 500;">Smart City Health Management System</p>
        </div>

        {% if error %}
        <div class="glass" style="padding: 1rem; border-radius: 10px; border-left: 4px solid var(--danger); background: rgba(239, 68, 68, 0.1); margin-bottom: 1.5rem; color: #b91c1c;">
            <i class="fas fa-circle-exclamation"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="email" style="color: #1e293b; font-weight: 600;">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required style="background: white; border: 1px solid #cbd5e1; color: #0f172a;">
            </div>
            <div class="form-group">
                <label for="password" style="color: #1e293b; font-weight: 600;">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required style="background: white; border: 1px solid #cbd5e1; color: #0f172a;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem; font-weight: 600;">
                Sign In <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; display: flex; flex-direction: column; gap: 0.5rem;">
            <div style="color: #475569;">Don't have an account? <a href="/register" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register here</a></div>
            <div style="font-size: 0.85rem;"><a href="/about" style="color: #64748b; text-decoration: underline;">About SHMS</a></div>
        </div>
    </div>
</div>
{% endblock %}
